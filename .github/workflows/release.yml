name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          brew install FiloSottile/musl-cross/musl-cross
          brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build darwin-arm64 + linux
        run: ./scripts/build.sh ${{ steps.version.outputs.VERSION }} darwin-arm64 linux-amd64 linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-arm64.dmg
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build windows-amd64 (pure Go, no CGO)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -tags fts5 \
            -ldflags "-s -w -X main.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/wikiloop.exe ./cmd/wikiloop/
          cd dist && zip -q wikiloop-${{ steps.version.outputs.VERSION }}-windows-amd64.zip wikiloop.exe && rm wikiloop.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/wikiloop-${{ steps.version.outputs.VERSION }}-windows-amd64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS/Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WikiLoop v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-arm64.dmg
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-windows-amd64.zip
