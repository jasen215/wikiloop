<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files — WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body > .container { max-width: 1200px; }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/">Home</a>
    <a href="/files" class="active">Files</a>
    <a href="/settings">Settings</a>
</nav>
<div class="container">
    <div class="card">
        <h2>Upload Files</h2>
        <div id="drop-zone" style="border:2px dashed #ccc;border-radius:8px;padding:32px;text-align:center;color:#888;cursor:pointer;margin-bottom:16px;transition:border-color .2s,background .2s">
            <div style="font-size:36px;margin-bottom:8px">📂</div>
            <div>Drop files here, or <label for="file-input" style="color:#0969da;cursor:pointer;text-decoration:underline">browse</label></div>
            <input id="file-input" type="file" multiple style="display:none">
        </div>
        <div id="upload-status" style="margin-bottom:12px;font-size:13px"></div>
    </div>
    <div class="card">
        <h2>Raw Files <span id="files-count" style="font-weight:400;color:#888;font-size:13px"></span></h2>
        <table class="files-table" id="files-table">
            <thead>
                <tr>
                    <th>Path</th>
                    <th style="width:90px">Size</th>
                    <th style="width:170px">Modified</th>
                </tr>
            </thead>
            <tbody id="files-body">
                <tr><td colspan="3" class="empty">Loading...</td></tr>
            </tbody>
        </table>
        <div id="files-pagination" class="pagination" style="display:none">
            <button id="prev-btn" disabled>&laquo; Previous</button>
            <span id="page-info"></span>
            <button id="next-btn" disabled>Next &raquo;</button>
        </div>
        <p id="files-error" class="error" style="display:none"></p>
    </div>
</div>

<script>
const PAGE_SIZE = 15;
let allFiles = [];
let currentPage = 1;

function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtTime(ts) {
    if (!ts) return '—';
    return new Date(ts * 1000).toLocaleString('en-US');
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPage() {
    const tbody = document.getElementById('files-body');
    const totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * PAGE_SIZE;
    const page = allFiles.slice(start, start + PAGE_SIZE);

    tbody.innerHTML = page.map(f => {
        const full = f.path || f.name;
        const chars = [...full];
        const display = chars.length > 60 ? chars.slice(0, 60).join('') + '…' : full;
        return `<tr>
            <td title="${escHtml(full)}">${escHtml(display)}</td>
            <td>${fmtSize(f.size)}</td>
            <td>${fmtTime(f.mod_time)}</td>
        </tr>`;
    }).join('');

    document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= totalPages;
    document.getElementById('files-pagination').style.display = totalPages > 1 ? '' : 'none';
}

document.getElementById('prev-btn').addEventListener('click', () => { currentPage--; renderPage(); });
document.getElementById('next-btn').addEventListener('click', () => { currentPage++; renderPage(); });

async function loadFiles() {
    const tbody = document.getElementById('files-body');
    const errEl = document.getElementById('files-error');
    try {
        const res = await fetch('/api/files');
        const data = await res.json();
        if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = '';
            tbody.innerHTML = '';
            return;
        }
        allFiles = data.files || [];
        document.getElementById('files-count').textContent = `(${allFiles.length} files)`;
        if (allFiles.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty">No files</td></tr>';
            return;
        }
        renderPage();
    } catch(e) {
        errEl.textContent = 'Failed to load file list';
        errEl.style.display = '';
        tbody.innerHTML = '';
    }
}

loadFiles();

// ── Upload ────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const uploadStatus = document.getElementById('upload-status');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#0969da'; dropZone.style.background = '#f0f6ff'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#ccc'; dropZone.style.background = ''; });
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = '#ccc';
    dropZone.style.background = '';
    uploadFiles(Array.from(e.dataTransfer.files));
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) uploadFiles(Array.from(fileInput.files));
    fileInput.value = '';
});

async function uploadFiles(files) {
    if (files.length === 0) return;
    let ok = 0, fail = 0;
    uploadStatus.textContent = `Uploading (0/${files.length})...`;
    for (let i = 0; i < files.length; i++) {
        const fd = new FormData();
        fd.append('file', files[i]);
        try {
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const data = await res.json();
            data.ok ? ok++ : fail++;
        } catch { fail++; }
        uploadStatus.textContent = `Uploading (${i+1}/${files.length})...`;
    }
    uploadStatus.innerHTML = ok > 0
        ? `<span style="color:#1a7f37">✓ ${ok} file(s) uploaded</span>` + (fail > 0 ? `, <span style="color:#cf222e">${fail} failed</span>` : '')
        : `<span style="color:#cf222e">${fail} file(s) failed</span>`;
    loadFiles();
}
</script>
</body>
</html>
