<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/" class="active">Home</a>
    <a href="/files">Files</a>
    <a href="/settings">Settings</a>
</nav>
<div class="container">
    <div class="card" id="status-card">
        <h2>Knowledge Base Status</h2>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-docs">—</div>
                <div class="stat-label">Documents</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-emb">—</div>
                <div class="stat-label">Embeddings</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-size">—</div>
                <div class="stat-label">Index Size</div>
            </div>
        </div>
        <p id="status-error" class="error" style="display:none"></p>
    </div>

    <div class="card">
        <h2>Search</h2>
        <div class="search-row">
            <input type="text" id="search-input" placeholder="Search the knowledge base..." autofocus>
            <button onclick="doSearch()">Search</button>
        </div>
        <ul class="results-list" id="results-list"></ul>
        <p id="search-error" class="error" style="display:none"></p>
    </div>
</div>

<script>
function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function layerBadge(layer) {
    const cls = {wiki: 'badge-wiki', raw: 'badge-raw', schema: 'badge-schema'}[layer] || 'badge-raw';
    return `<span class="badge ${cls}">${layer}</span>`;
}

async function loadStatus() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (data.error) {
            document.getElementById('status-error').textContent = data.error;
            document.getElementById('status-error').style.display = '';
            return;
        }
        document.getElementById('stat-docs').textContent = data.documents ?? 0;
        document.getElementById('stat-emb').textContent = data.embeddings ?? 0;
        document.getElementById('stat-size').textContent = fmtSize(data.index_size ?? 0);
    } catch(e) {
        document.getElementById('status-error').textContent = 'Cannot connect to server';
        document.getElementById('status-error').style.display = '';
    }
}

async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    const list = document.getElementById('results-list');
    const errEl = document.getElementById('search-error');
    errEl.style.display = 'none';
    list.innerHTML = '';
    if (!q) return;

    try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = '';
            return;
        }
        const results = data.results || [];
        if (results.length === 0) {
            list.innerHTML = '<li><span class="empty">No results found</span></li>';
            return;
        }
        results.forEach(r => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="result-title">${escHtml(r.title || r.path)}</div>
                <div class="result-meta">${layerBadge(r.layer)} ${escHtml(r.path)}</div>
                ${r.snippet ? `<div class="result-snippet">${escHtml(r.snippet)}</div>` : ''}
            `;
            list.appendChild(li);
        });
    } catch(e) {
        errEl.textContent = 'Search request failed';
        errEl.style.display = '';
    }
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});

loadStatus();
</script>
</body>
</html>
